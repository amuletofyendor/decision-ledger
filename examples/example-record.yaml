summary: MCP dynamic clients may be clobbered by shared DB identity restarts.
body: |
  The working thought is that dynamic MCP clients are not simply disappearing
  because the active API process forgot them. They may be overwritten or
  removed when another identity deployment sharing the same backing database
  restarts and runs older seeding or cleanup behavior.

  This should be treated as a cross-environment identity persistence issue until
  disproven with current database state, logs, and deployment restart evidence.
