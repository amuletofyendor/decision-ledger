id: rec_20260507_113012_abcd
subject: product.auth.oauth.client-persistence
kind: thought
status: active
created_at: "2026-05-07T11:30:12+01:00"
created_by: alice
summary: OAuth client registrations should survive service restarts.
body: |
  The working thought is that dynamically registered clients should be
  persisted outside process memory. If they only live in memory, a restart could
  remove registrations that other tools still expect to use.

  This should be treated as a persistence design issue until disproven with
  current storage state, service logs, and restart evidence.
tags:
